<title>CEZOO Blinkit Style</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:#f7fbff;
}

/* Full Screen Background */
.bg-container{
    position:fixed;
    inset:0;
    overflow:hidden;
}

/* Moving Layer */
.bg-track{
    position:absolute;
    top:-80px;
    left:-80px;

    display:grid;
    grid-template-columns:repeat(12,130px);
    gap:24px;

    width:max-content;

    animation:moveLeft 20s linear infinite;
}

/* Blinkit Style Cards */
.product-card{
    width:130px;
    height:130px;

    background:#DDF4FF; /* Sky Blue */

    border-radius:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    border:1px solid #B9E8FF;

    box-shadow:
    0 4px 12px rgba(0,150,255,0.12);
}

.product-card img{
    width:110px;
    height:110px;
    object-fit:contain;
}
.product-card img{
    width:80px;
    height:80px;
    object-fit:contain;
}

/* Continuous movement */
@keyframes moveLeft{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-220px);
    }
}

/* Mobile */
@media(max-width:768px){

.product-card{
    width:72px;
    height:72px;
    border-radius:14px;
}

.product-card img{
    width:42px;
    height:42px;
}

.bg-track{
    grid-template-columns:repeat(10,72px);
    gap:18px;
}

}
/* LOGIN SECTION */


.login-section{
    font-family: 'Inter', sans-serif;
}
/* Logo Up Down Animation */

.login-logo{
    width:70px;
    height:70px;
    object-fit:contain;
    margin-bottom:12px;
}

@keyframes floatLogo{

    0%{
        transform:translateY(0);
    }

    50%{

    }

    100%{

    }
}

.login-section{

}

}
/* PC / Laptop Not Allowed */
.pc-block{
    display:none;
}

.otp-boxes{

    width:45px !important;

.shake{
    animation:shake .3s;

@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-8px);}
75%{transform:translateX(8px);}

.resend-btn{

    color:#00A651;
    font-size:14px;
    font-weight:600;
    margin-top:10px;

<script>

const boxes=document.querySelectorAll(".otp-input");
// Restore OTP screen after refresh
if(localStorage.getItem("otpMode")==="true"){

    document.getElementById("phoneScreen").style.display="none";
    document.getElementById("otpScreen").style.display="block";

    document.getElementById("title").innerHTML="Enter OTP";

    document.getElementById("phoneInput").value=
        localStorage.getItem("phoneNumber") || "";

}
boxes.forEach((box,index)=>{

    box.addEventListener("input",()=>{

        if(box.value && index<5){
            boxes[index+1].focus();
        }

        let otp="";

        boxes.forEach(b=>{
            otp+=b.value;
        });

        // Check only when all 6 digits are entered
        if(otp.length===6){

            if(otp==="123456"){

    localStorage.setItem("isLoggedIn","true");

    localStorage.setItem(
        "userPhone",
        localStorage.getItem("phoneNumber")
    );

    localStorage.removeItem("otpMode");

    window.location.href="../index.html";

}
            
            else{

                document.querySelector(".otp-boxes").classList.add("shake");

                setTimeout(()=>{
                    document.querySelector(".otp-boxes").classList.remove("shake");

                    // Clear OTP
                    boxes.forEach(box=>{
                        box.value="";
                    });

                    // Focus first box again
                    boxes[0].focus();

                },300);

            }

        }

    });

});
function showOtp(){

    let phone=document.getElementById("phoneInput");

    if(phone.value.length!=10){

        document.querySelector(".phone-input").classList.add("shake");

        setTimeout(()=>{
            document.querySelector(".phone-input").classList.remove("shake");
        },300);

        return;
    }

    // Save state
    localStorage.setItem("otpMode","true");
    localStorage.setItem("phoneNumber",phone.value);

    document.getElementById("phoneScreen").style.display="none";
    document.getElementById("otpScreen").style.display="block";
    document.getElementById("title").innerHTML="Enter OTP";

    boxes[0].focus();

}

function backToPhone(){

    // Clear state
    localStorage.removeItem("otpMode");
    localStorage.removeItem("phoneNumber");

    document.getElementById("phoneScreen").style.display="block";
    document.getElementById("otpScreen").style.display="none";

    document.getElementById("title").innerHTML="Log in or Sign up";

    boxes.forEach(box=>{
        box.value="";
    });

}



// Redirect PC users to home page
if(window.innerWidth > 768){
    window.location.href="../index.html";
}

window.addEventListener("resize",()=>{

    if(window.innerWidth > 768){
        window.location.href="../index.html";
    }

});




</script>
